spring.application.name=TradeStream
spring.devtools.restart.enabled=false

# ── Database (H2 for dev) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:tradestream
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Market Data APIs ────────────────────────────────────────────────────────
twelvedata.base.url=https://api.twelvedata.com
twelvedata.api.key=${TWELVEDATA_API_KEY:your-twelvedata-key-here}

coingecko.api.url=https://api.coingecko.com/api/v3

# ── JWT ─────────────────────────────────────────────────────────────────────
spring.app.jwtSecret=${JWT_SECRET:dev-only-secret-key-change-in-production-32c}
spring.app.jwtExpirationInMs=${JWT_EXPIRATION_MS:86400000}

# ── Payment Gateways ────────────────────────────────────────────────────────
stripe.api.key=${STRIPE_PUBLIC_KEY:pk_test_placeholder}
stripe.api.secret=${STRIPE_SECRET_KEY:sk_test_placeholder}
razorpay.api.key=${RAZORPAY_API_KEY:rzp_test_placeholder}
razorpay.api.secret=${RAZORPAY_API_SECRET:rzp_secret_placeholder}

# ── Logging (dev) ───────────────────────────────────────────────────────────
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO

# ── Swagger / OpenAPI ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
